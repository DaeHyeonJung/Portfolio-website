<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Card</title>
  <style>
    @font-face {
      font-family: "Paperlogy";
      src: url("fonts/Paperlogy-4Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: "Paperlogy";
      src: url("fonts/Paperlogy-6SemiBold.ttf") format("truetype");
      font-weight: 600;
      font-style: normal;
    }

    @font-face {
      font-family: "Paperlogy";
      src: url("fonts/Paperlogy-7Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
    }

    :root {
      color-scheme: dark;
      --bg: #111111;
      --bg-deep: #020202;
      --ink: #f5f5f1;
      --muted: #a6a6a1;
      --panel: rgba(18, 18, 18, 0.86);
      --line: rgba(255, 255, 255, 0.1);
      --accent: #f1f1ec;
      --accent-soft: rgba(255, 255, 255, 0.14);
      --shadow: 0 34px 100px rgba(0, 0, 0, 0.58);
      --body-glow-1: rgba(255, 255, 255, 0.08);
      --body-glow-2: rgba(255, 255, 255, 0.05);
      --body-orb-1: rgba(255, 255, 255, 0.08);
      --body-orb-2: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.12);
      --card-bg-start: rgba(20, 20, 20, 0.96);
      --card-bg-end: rgba(6, 6, 6, 0.92);
      --card-inner-line: rgba(255, 255, 255, 0.05);
      --panel-bg-start: rgba(19, 19, 19, 0.92);
      --panel-bg-end: rgba(11, 11, 11, 0.86);
      --panel-inner-line: rgba(255, 255, 255, 0.04);
      --panel-glow: rgba(255, 255, 255, 0.06);
      --portrait-border: rgba(255, 255, 255, 0.12);
      --portrait-bg-start: rgba(28, 28, 28, 0.94);
      --portrait-bg-end: rgba(12, 12, 12, 0.9);
      --contact-bg: rgba(24, 24, 24, 0.94);
      --timeline-fade: rgba(255, 255, 255, 0.06);
      --item-bg-start: rgba(24, 24, 24, 0.9);
      --item-bg-end: rgba(14, 14, 14, 0.88);
      --chip-border: rgba(255, 255, 255, 0.12);
      --chip-bg: rgba(30, 30, 30, 0.96);
      --chip-hover: rgba(255, 255, 255, 0.12);
      --download-text: #0a0a0a;
      --toggle-shell: rgba(14, 14, 14, 0.82);
      --toggle-border: rgba(255, 255, 255, 0.12);
      --toggle-pill: rgba(255, 255, 255, 0.12);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    body[data-theme="light"] {
      color-scheme: light;
      --bg: #edf2f6;
      --bg-deep: #dfe7ee;
      --ink: #1f2933;
      --muted: #627181;
      --panel: rgba(248, 251, 253, 0.82);
      --line: rgba(84, 98, 113, 0.14);
      --accent: #5f768c;
      --accent-soft: rgba(95, 118, 140, 0.14);
      --shadow: 0 22px 60px rgba(31, 41, 51, 0.12);
      --body-glow-1: rgba(95, 118, 140, 0.14);
      --body-glow-2: rgba(31, 41, 51, 0.07);
      --body-orb-1: rgba(95, 118, 140, 0.12);
      --body-orb-2: rgba(31, 41, 51, 0.08);
      --card-border: rgba(255, 255, 255, 0.7);
      --card-bg-start: rgba(255, 255, 255, 0.84);
      --card-bg-end: rgba(240, 245, 249, 0.72);
      --card-inner-line: rgba(255, 255, 255, 0.3);
      --panel-bg-start: rgba(248, 251, 253, 0.88);
      --panel-bg-end: rgba(236, 242, 246, 0.78);
      --panel-inner-line: rgba(255, 255, 255, 0.45);
      --panel-glow: rgba(95, 118, 140, 0.09);
      --portrait-border: rgba(84, 98, 113, 0.18);
      --portrait-bg-start: rgba(255, 255, 255, 0.82);
      --portrait-bg-end: rgba(239, 244, 248, 0.72);
      --contact-bg: rgba(255, 255, 255, 0.82);
      --timeline-fade: rgba(95, 118, 140, 0.08);
      --item-bg-start: rgba(255, 255, 255, 0.78);
      --item-bg-end: rgba(244, 248, 251, 0.7);
      --chip-border: rgba(84, 98, 113, 0.16);
      --chip-bg: rgba(255, 255, 255, 0.92);
      --chip-hover: rgba(95, 118, 140, 0.1);
      --download-text: #ffffff;
      --toggle-shell: rgba(248, 251, 253, 0.88);
      --toggle-border: rgba(84, 98, 113, 0.16);
      --toggle-pill: rgba(95, 118, 140, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: "Paperlogy", "Noto Sans KR", "Malgun Gothic", sans-serif;
      font-weight: 400;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, var(--body-glow-1), transparent 28%),
        radial-gradient(circle at bottom right, var(--body-glow-2), transparent 30%),
        linear-gradient(135deg, var(--bg), var(--bg-deep));
      position: relative;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      border-radius: 999px;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 420px;
      height: 420px;
      top: -110px;
      right: -120px;
      background: radial-gradient(circle, var(--body-orb-1), transparent 68%);
    }

    body::after {
      width: 360px;
      height: 360px;
      bottom: -120px;
      left: -80px;
      background: radial-gradient(circle, var(--body-orb-2), transparent 70%);
    }

    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 20;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      width: 136px;
      padding: 3px;
      border: 1px solid var(--toggle-border);
      border-radius: 999px;
      background: var(--toggle-shell);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(16px);
      font: inherit;
      cursor: pointer;
      overflow: hidden;
      appearance: none;
    }

    .theme-toggle::before {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: calc(50% - 3px);
      height: calc(100% - 6px);
      border-radius: 999px;
      background: var(--toggle-pill);
      transform: translateX(0);
      transition: transform 0.28s ease, background 0.28s ease;
    }

    .theme-toggle[data-theme="monochrome"]::before {
      transform: translateX(100%);
    }

    .theme-toggle-label {
      position: relative;
      z-index: 1;
      padding: 7px 0;
      color: var(--muted);
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: color 0.25s ease, opacity 0.25s ease;
    }

    .theme-toggle[data-theme="light"] .theme-toggle-label-light,
    .theme-toggle[data-theme="monochrome"] .theme-toggle-label-dark {
      color: var(--ink);
    }

    .theme-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1720px, calc(100% - 4px));
      height: auto;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding: 4px 0;
      display: grid;
      align-items: start;
    }

    .card {
      display: grid;
      grid-template-rows: auto auto;
      gap: 10px;
      height: auto;
      min-height: 0;
      align-content: start;
      padding: clamp(12px, 1.6vw, 20px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(145deg, var(--card-bg-start), var(--card-bg-end));
      box-shadow: var(--shadow), inset 0 1px 0 var(--card-inner-line);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1.04fr 0.66fr 1.82fr;
      gap: 12px;
      align-items: stretch;
      min-height: 0;
    }

    .panel {
      position: relative;
      overflow: hidden;
      min-height: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, var(--panel-bg-start), var(--panel-bg-end));
      box-shadow: inset 0 1px 0 var(--panel-inner-line);
      animation: rise 0.9s ease both;
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: auto -40px -40px auto;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--panel-glow), transparent 68%);
      pointer-events: none;
    }

    .profile-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 10px;
      min-height: 0;
    }

    .profile-panel .section-title {
      margin-bottom: 0;
      font-size: 1.04rem;
    }

    .profile-header {
      display: grid;
      grid-template-columns: minmax(168px, 188px) minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      min-height: 0;
    }

    .portrait {
      width: min(100%, 188px);
      height: auto;
      aspect-ratio: 413 / 531;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--portrait-border);
      background: linear-gradient(180deg, var(--portrait-bg-start), var(--portrait-bg-end));
      display: flex;
      align-items: center;
      justify-content: center;
      justify-self: start;
      align-self: start;
      text-align: center;
    }

    .portrait img {
      width: 100%;
      height: 100%;
      max-height: none;
      object-fit: cover;
      object-position: center 12%;
      transform: scale(1.08);
      border-radius: 20px;
      display: block;
    }

    .identity {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 6px;
      min-height: 0;
      align-self: start;
      padding: 1px 0 0 6px;
    }

    .identity h2 {
      margin: 0;
      font-family: "Paperlogy", "Noto Sans KR", "Malgun Gothic", sans-serif;
      font-weight: 700;
      font-size: clamp(1.54rem, 1.95vw, 1.96rem);
      line-height: 1.01;
      letter-spacing: -0.05em;
    }

    .identity-name-en {
      font-family: "Paperlogy", "Noto Sans KR", "Malgun Gothic", sans-serif;
      font-weight: 600;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .profile-keywords-list {
      display: flex;
      flex-wrap: wrap;
      gap: 3px 10px;
      margin-top: 2px;
    }

    .profile-keywords-list span {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.18;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .contact-list {
      display: grid;
      gap: 6px;
    }

    .profile-panel .contact-list {
      grid-template-columns: 1fr;
      margin-top: 6px;
      width: min(100%, 16.4rem);
      max-width: none;
      margin-left: auto;
    }

    .contact-item {
      min-width: 0;
      padding: 7px 12px 7px 10px;
      border-radius: 12px;
      background: var(--contact-bg);
      border: 1px solid var(--line);
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.22;
    }

    .contact-item strong {
      display: block;
      margin-bottom: 1px;
      font-weight: 600;
      color: var(--ink);
      font-size: 0.66rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .contact-value {
      display: block;
      color: inherit;
      text-decoration: none;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .contact-item a.contact-value:hover {
      text-decoration: underline;
    }

    .section-title {
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      font-weight: 600;
      font-size: 0.98rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-title span:last-child {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: none;
    }

    .education-panel {
      display: grid;
      align-content: start;
    }

    .timeline {
      list-style: none;
      margin: 0;
      padding: 0 0 0 18px;
      position: relative;
      display: grid;
      gap: 12px;
    }

    .education-panel .timeline {
      gap: 18px;
    }

    .education-panel .timeline small {
      font-size: 0.92rem;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      bottom: 3px;
      width: 2px;
      background: linear-gradient(var(--accent), var(--timeline-fade));
    }

    .timeline li {
      position: relative;
      display: grid;
      gap: 4px;
    }

    .timeline li::before {
      content: "";
      position: absolute;
      left: -18px;
      top: 8px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 5px var(--accent-soft);
    }

    .timeline strong {
      font-weight: 600;
      font-size: 1rem;
    }

    .timeline span,
    .timeline small,
    .achievement-item p,
    .research-item p,
    .research-meta {
      color: var(--muted);
    }

    .timeline small {
      line-height: 1.5;
    }

    .achievement-list,
    .research-list {
      display: grid;
      gap: 10px;
    }

    .achievement-list {
      min-height: 0;
      overflow-y: hidden;
      padding-right: 4px;
      scrollbar-gutter: stable;
    }

    .achievement-item,
    .research-item {
      padding: 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--item-bg-start), var(--item-bg-end));
    }

    .achievement-item,
    .research-item {
      display: grid;
      gap: 10px;
    }

    .achievement-head,
    .research-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .achievement-summary,
    .research-summary {
      min-width: 0;
      flex: 1;
    }

    .achievement-item strong,
    .research-item strong {
      display: block;
      margin-bottom: 8px;
      font-size: 1rem;
    }

    .achievement-summary strong,
    .research-summary strong {
      margin-bottom: 0;
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .achievement-summary strong {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .research-summary strong {
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      font-size: 1rem;
      line-height: 1.4;
    }

    .achievement-toggle,
    .research-toggle {
      flex: 0 0 auto;
      padding: 7px 10px;
      border: 1px solid var(--chip-border);
      border-radius: 999px;
      background: var(--chip-bg);
      color: var(--ink);
      font: inherit;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
    }

    .achievement-toggle:hover,
    .research-toggle:hover {
      background: var(--chip-hover);
    }

    .achievement-item p,
    .research-item p {
      margin: 0;
      line-height: 1.6;
    }

    .achievement-detail,
    .research-detail {
      display: grid;
      gap: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .research-detail p {
      color: var(--ink);
      font-size: 1.08rem;
      line-height: 1.72;
    }

    .research-detail strong {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      color: var(--ink);
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .research-detail strong::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex: 0 0 7px;
    }

    .achievement-detail[hidden],
    .research-detail[hidden] {
      display: none;
    }

    .achievement-download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent);
      color: var(--download-text);
      text-decoration: none;
      font-size: 0.84rem;
      font-weight: 600;
    }

    .achievement-downloads,
    .research-downloads {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .research-meta {
      margin: 4px 0 0;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .research-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .research-keywords span {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border: 1px solid var(--chip-border);
      border-radius: 999px;
      background: var(--chip-bg);
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.35;
    }

    .research-downloads .achievement-download {
      font-size: 0.9rem;
    }

    .research-panel {
      margin-top: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto;
      align-content: start;
      animation-delay: 0.14s;
      overflow-y: hidden;
    }

    .profile-panel { animation-delay: 0.04s; }
    .education-panel { animation-delay: 0.08s; }
    .achievement-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      align-content: start;
      animation-delay: 0.12s;
      overflow: hidden;
    }
    .achievement-panel.is-scrollable .achievement-list { overflow-y: auto; }
    .research-panel.is-scrollable { overflow-y: auto; }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 960px) {
      body {
        overflow-y: auto;
      }

      .card-grid {
        grid-template-columns: 1fr 1fr;
      }

      .page {
        height: auto;
        min-height: 100vh;
        min-height: 100dvh;
      }

      .card {
        display: block;
        height: auto;
        overflow: visible;
      }

      .profile-panel {
        grid-column: 1 / -1;
      }

      .profile-header {
        grid-template-columns: minmax(160px, 182px) minmax(0, 1fr);
      }

      .profile-panel .contact-list {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 640px) {
      .theme-toggle {
        top: 12px;
        right: 12px;
        width: 124px;
      }

      .theme-toggle-label {
        padding: 6px 0;
        font-size: 0.62rem;
      }

      .page {
        width: min(1720px, calc(100% - 4px));
        padding: 4px 0;
      }

      .card-grid {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 16px;
      }

      .profile-header {
        grid-template-columns: 1fr;
      }

      .portrait {
        height: auto;
        aspect-ratio: 413 / 531;
        max-width: 188px;
      }

      .profile-panel .contact-list {
        grid-template-columns: 1fr;
        width: 100%;
      }

    }
  </style>
</head>
<body>
  <button class="theme-toggle" type="button" data-theme="monochrome" aria-label="Switch to light theme">
    <span class="theme-toggle-label theme-toggle-label-light">Light</span>

        <section class="panel education-panel"></section>
        <section class="panel achievement-panel"></section>
      </div>
      <section class="panel research-panel"></section>
    </section>
  </main>

      const applyTheme = (theme) => {
        const nextTheme = theme === "light" ? "light" : "monochrome";
        document.body.dataset.theme = nextTheme;

        if (themeToggle) {
          themeToggle.dataset.theme = nextTheme;
          themeToggle.setAttribute(
            "aria-label",
            nextTheme === "light" ? "Switch to dark theme" : "Switch to light theme"
          );
        }
      };
      const renderSectionTitle = (title, subtitle = "") => `
        <h3 class="section-title">
          <span>${title}</span>
          ${subtitle ? `<span>${subtitle}</span>` : ""}
        </h3>
      `;
      const renderContact = ({ label, value, href }) => `
        <div class="contact-item">
          <strong>${label}</strong>
          ${href
            ? `<a class="contact-value" href="${href}" target="_blank" rel="noopener noreferrer">${value}</a>`
            : `<span class="contact-value">${value}</span>`
          }
        </div>
      `;
      const assetBasePath = (() => {
        if (!window.location.hostname.endsWith("github.io")) {
          return "";
        }

        const segments = window.location.pathname.split("/").filter(Boolean);
        return segments.length ? `/${segments[0]}` : "";
      })();
      const toAssetHref = (path) => {
        if (!path) {
          return path;
        }

        if (/^(?:[a-z]+:)?\/\//i.test(path) || path.startsWith("mailto:") || path.startsWith("tel:") || path.startsWith("#")) {
          return path;
        }

        if (path.startsWith("/")) {
          return encodeURI(path);
        }

        const encodedPath = encodeURI(path);
        return assetBasePath ? `${assetBasePath}/${encodedPath}` : encodedPath;
      };
      const renderResourceLinks = (items, className, mode = "download") => {
        if (!items || !items.length) {
          return "";
        }

        return `
          <div class="${className}">
            ${items.map((item) => {
              const href = item.external ? item.href : toAssetHref(item.href);
              const attrs = item.external || mode === "blank"
                ? `target="_blank" rel="noopener noreferrer"`
                : `download`;
              return `<a class="achievement-download" href="${href}" ${attrs}>${item.label || "파일 다운로드"}</a>`;
            }).join("")}
          </div>
        `;
      };
      const renderToggleButton = (className, detailId) => `
        <button class="${className}" type="button" aria-expanded="false" aria-controls="${detailId}">
          ${toggleLabels.expand}
        </button>
      `;
      const renderProfile = ({ title, image, name, nameEn, keywords, contacts }) => `
        ${renderSectionTitle(title)}
        <div class="profile-header">
          <div class="portrait">
            <img src="${toAssetHref(image.src)}" alt="${image.alt}">
          </div>
          <div class="identity">
            <h2>${name}</h2>
            <div class="identity-name-en">${nameEn}</div>
            <div class="profile-keywords-list" aria-label="Keywords">
              ${keywords.map((keyword) => `<span>${keyword}</span>`).join("")}
            </div>
            <div class="contact-list">
              ${contacts.map(renderContact).join("")}
            </div>
          </div>
        </div>
      `;
      const renderEducation = ({ title, items }) => `
        ${renderSectionTitle(title)}
        <ol class="timeline">
          ${items.map((item) => `
            <li>
              <strong>${item.name}</strong>
              <span>${item.period}</span>
              <small>${item.detail}</small>
            </li>
          `).join("")}
        </ol>
      `;
      const renderAchievements = ({ title, subtitle, items }) => `
        ${renderSectionTitle(title, subtitle)}
        <div class="achievement-list">
          ${items.map((item, index) => {
            const detailId = `achievement-detail-${index}`;
            const hasDownloads = Boolean(item.downloads && item.downloads.length);
            return `
              <article class="achievement-item">
                <div class="achievement-head">
                  <div class="achievement-summary">
                    <strong>${item.title} - ${item.award}</strong>
                  </div>
                  ${hasDownloads ? renderToggleButton("achievement-toggle", detailId) : ""}
                </div>
                ${hasDownloads
                  ? `<div class="achievement-detail" id="${detailId}" hidden>
                      ${renderResourceLinks(item.downloads, "achievement-downloads")}
                    </div>`
                  : ""
                }
              </article>
            `;
          }).join("")}
        </div>
      `;
      const renderResearch = ({ title, subtitle, items }) => `
        ${renderSectionTitle(title, subtitle)}
        <div class="research-list">
          ${items.map((item, index) => {
            const detailId = `research-detail-${index}`;
            const hasDetails = Boolean(item.details && item.details.length);
            const hasLinks = Boolean(item.links && item.links.length);
            const hasExtraContent = hasDetails || hasLinks;
            return `
              <article class="research-item">
                <div class="research-head">
                  <div class="research-summary">
                    <strong>${item.title}</strong>
                    <p class="research-meta">${item.meta}</p>
                    ${item.keywords && item.keywords.length
                      ? `<div class="research-keywords">${item.keywords.map((keyword) => `<span>${keyword}</span>`).join("")}</div>`
                      : ""
                    }
                  </div>
                  ${hasExtraContent ? renderToggleButton("research-toggle", detailId) : ""}
                </div>
                ${hasExtraContent
                  ? `<div class="research-detail" id="${detailId}" hidden>
                      ${item.details.map((detail) => `<p>${detail}</p>`).join("")}
                      ${renderResourceLinks(item.links, "research-downloads", "blank")}
                    </div>`
                  : ""
                }
              </article>
            `;
          }).join("")}
        </div>
      `;
      const setExpandedState = (button, detail, expanded) => {
        button.setAttribute("aria-expanded", String(expanded));
        button.textContent = expanded ? toggleLabels.collapse : toggleLabels.expand;
        detail.hidden = !expanded;
      };
      const readStoredTheme = () => {
        try {
          return localStorage.getItem(themeStorageKey);
        } catch (error) {
          return null;
        }
      };
      const writeStoredTheme = (theme) => {
        try {
          localStorage.setItem(themeStorageKey, theme);
        } catch (error) {
          // Ignore storage access failures and keep the theme in memory.
        }
      };

      applyTheme(readStoredTheme() || "monochrome");

      if (themeToggle) {
        themeToggle.addEventListener("click", () => {
          const currentTheme = document.body.dataset.theme === "light" ? "light" : "monochrome";
          const nextTheme = currentTheme === "light" ? "monochrome" : "light";
          applyTheme(nextTheme);
          writeStoredTheme(nextTheme);
        });
      }

      const setupExpandablePanel = (panel, detailSelector, buttonSelector, options = {}) => {
        const { lockHeight = false } = options;

        const lockPanelHeight = () => {
          if (!lockHeight) {
            return;
          }

          const states = Array.from(panel.querySelectorAll(buttonSelector)).map((button) => {
            const detailId = button.getAttribute("aria-controls");
            return {
              button,
              detail: panel.querySelector(`#${detailId}`),
              expanded: button.getAttribute("aria-expanded") === "true"
            };
          }).filter(({ detail }) => Boolean(detail));

          panel.style.height = "";
          panel.style.maxHeight = "";

          states.forEach(({ button, detail }) => {
            setExpandedState(button, detail, false);
          });

          const lockedHeight = Math.ceil(panel.getBoundingClientRect().height);

          states.forEach(({ button, detail, expanded }) => {
            setExpandedState(button, detail, expanded);
          });

          if (lockedHeight > 0) {
            panel.style.height = `${lockedHeight}px`;
            panel.style.maxHeight = `${lockedHeight}px`;
          }
        };

        const updatePanelScrollState = () => {
          const hasExpandedDetail = Boolean(
            panel.querySelector(`${detailSelector}:not([hidden])`)
          );
          const hasOverflow = hasExpandedDetail && panel.scrollHeight > panel.clientHeight + 4;
          panel.classList.toggle("is-scrollable", hasOverflow);

          if (!hasOverflow) {
            panel.scrollTop = 0;
          }
        };
        const handleResize = () => {
          lockPanelHeight();
          updatePanelScrollState();
        };

        handleResize();
        window.addEventListener("resize", handleResize);

        if (lockHeight && document.fonts && document.fonts.ready) {
          document.fonts.ready.then(handleResize);
        }

        panel.addEventListener("click", (event) => {
          const button = event.target.closest(buttonSelector);
          if (!button || !panel.contains(button)) {
            return;
          }

          const detailId = button.getAttribute("aria-controls");
          const detail = panel.querySelector(`#${detailId}`);
          if (!detail) {
            return;
          }

          const isExpanded = button.getAttribute("aria-expanded") === "true";
          setExpandedState(button, detail, !isExpanded);
          requestAnimationFrame(updatePanelScrollState);
        });
      };
      const renderPanel = (panel, markup, expandableConfig) => {
        if (!panel) {
          return;
        }

        panel.innerHTML = markup;

        if (expandableConfig) {
          setupExpandablePanel(
            panel,
            expandableConfig.detailSelector,
            expandableConfig.buttonSelector,
            expandableConfig.options
          );
        }
      };

      renderPanel(panels.profile, renderProfile(content.profile));
      renderPanel(panels.education, renderEducation(content.education));
      renderPanel(
        panels.achievements,
        renderAchievements(content.achievements),
        {
          detailSelector: ".achievement-detail",
          buttonSelector: ".achievement-toggle",
          options: { lockHeight: true }
        }
      );
      renderPanel(
        panels.research,
        renderResearch(content.research),
        {
          detailSelector: ".research-detail",
          buttonSelector: ".research-toggle",
          options: {}
        }
      );
    })();
